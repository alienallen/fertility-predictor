<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记录 - 接好孕</title>
  <style>
    :root {
      --color-cream: #FDF8F3;
      --color-sage: #9CAF88;
      --color-sage-light: #C5D4B8;
      --color-sage-dark: #7A9163;
      --color-terracotta: #D4A574;
      --color-terracotta-light: #E8C9A8;
      --color-blush: #E8B4B8;
      --color-text: #4A4541;
      --color-text-light: #7A7470;
      --color-white: #FFFFFF;
      --color-period: #E8B4B8;
      --font-display: 'Noto Serif SC', Georgia, serif;
      --font-body: 'Quicksand', -apple-system, sans-serif;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 9999px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--color-cream); color: var(--color-text); min-height: 100vh; }
    .app { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--color-cream); }
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: var(--radius-full); border: none; background: var(--color-white); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(74,69,65,0.08); }
    .back-btn svg { width: 20px; height: 20px; color: var(--color-text); }
    .header h1 { font-family: var(--font-display); font-size: 24px; font-weight: 600; }
    .tabs { display: flex; padding: 0 16px; gap: 8px; }
    .tab { flex: 1; padding: 12px; border: none; background: var(--color-white); border-radius: var(--radius-md); font-size: 14px; font-weight: 600; color: var(--color-text-light); cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--color-sage); color: var(--color-white); }
    .content { padding: 16px; }
    .section { background: var(--color-white); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(74,69,65,0.06); }
    .section-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title .icon { width: 24px; height: 24px; border-radius: 50%; background: var(--color-blush-light); display: flex; align-items: center; justify-content: center; }
    .record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #F0EBE6; }
    .record-item:last-child { border-bottom: none; }
    .record-date { font-weight: 600; }
    .record-value { color: var(--color-text-light); font-size: 14px; }
    .add-btn { width: 100%; padding: 16px; border: 2px dashed var(--color-sage-light); border-radius: var(--radius-md); background: none; color: var(--color-sage-dark); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
    .add-btn:hover { background: var(--color-sage-light); border-color: var(--color-sage); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-light); }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
    .tip-box { background: rgba(157, 175, 136, 0.15); border-radius: var(--radius-md); padding: 16px; margin-top: 16px; display: flex; gap: 12px; }
    .tip-box svg { width: 20px; height: 20px; color: var(--color-sage-dark); flex-shrink: 0; }
    .tip-box p { font-size: 13px; line-height: 1.5; color: var(--color-sage-dark); }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--color-white); display: flex; justify-content: space-around; padding: 12px 0 24px; box-shadow: 0 -2px 20px rgba(74,69,65,0.05); }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; border: none; background: none; cursor: pointer; }
    .tab-item.active { color: var(--color-sage-dark); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-item span { font-size: 11px; font-weight: 500; }
    .spacer { height: 80px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <button class="back-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
      <h1>记录</h1>
    </header>
    <div class="tabs">
      <button class="tab active">经期</button>
      <button class="tab">体温</button>
      <button class="tab">试纸</button>
    </div>
    <div class="content">
      <div class="section">
        <div class="section-title"><span class="icon">🌸</span>最近记录</div>
        <div class="record-item">
          <div><div class="record-date">2026-03-14 ~ 03-18</div><div class="record-value">持续 5 天</div></div>
        </div>
        <div class="record-item">
          <div><div class="record-date">2026-02-12 ~ 02-16</div><div class="record-value">持续 5 天</div></div>
        </div>
        <div class="record-item">
          <div><div class="record-date">2026-01-10 ~ 01-14</div><div class="record-value">持续 5 天</div></div>
        </div>
      </div>
      <button class="add-btn">+ 记录经期</button>
      <div class="tip-box">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p>记录经期数据能帮助算法更准确地预测排卵日，建议持续记录哦～</p>
      </div>
    </div>
    <div class="spacer"></div>
    <nav class="tab-bar">
      <button class="tab-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>日历</span></button>
      <button class="tab-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>记录</span></button>
      <button class="tab-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2z"/></svg><span>统计</span></button>
      <button class="tab-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>设置</span></button>
    </nav>
  </div>
</body>
</html>
